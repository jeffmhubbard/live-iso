LABEL arch
TEXT HELP
    Boot PENGUIN Desktop Linux installer on BIOS.
     It allows you to install PENGUIN Desktop Linux
     or perform system maintenance.
ENDTEXT
MENU LABEL PENGUIN Desktop Linux installer (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Accessibility boot option
LABEL archspeech
TEXT HELP
    Boot PENGUIN Desktop Linux installer on BIOS with screen reader.
     It allows you to install PENGUIN Desktop Linux
     or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL PENGUIN Desktop Linux installer (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
